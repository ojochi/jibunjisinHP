<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>自分自身</title>
    <meta name="description" content="自分自身のホームページです。お知らせを掲載しています。">
    <link rel="canonical" href="https://jibunjisin.net/">
    <style>
      :root {
        --panel: transparent;
        --line: rgba(255, 245, 238, 0.78);
        --text: #f0e3d7;
        --muted: #c9b29f;
        --accent: #d79b72;
        --shadow: 0 14px 30px rgba(0, 0, 0, 0.24);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Yu Mincho", "Hiragino Mincho ProN", serif;
        color: var(--text);
        background:
          linear-gradient(rgba(23, 19, 17, 0.72), rgba(23, 19, 17, 0.72)),
          url("./assets/backgrounds/01_leather.jpg") center / cover fixed no-repeat;
      }

      main {
        width: min(920px, calc(100% - 32px));
        margin: 0 auto;
        padding: 56px 0 72px;
      }

      .hero,
      .panel {
        background: var(--panel);
        border-radius: 18px;
        box-shadow: var(--shadow);
        position: relative;
      }

      .hero::before,
      .panel::before,
      .notice-frame::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        pointer-events: none;
        background:
          repeating-linear-gradient(90deg, var(--line) 0 10px, transparent 10px 24px) top / calc(100% - 26px) 2px no-repeat,
          repeating-linear-gradient(90deg, var(--line) 0 10px, transparent 10px 24px) bottom / calc(100% - 26px) 2px no-repeat,
          repeating-linear-gradient(0deg, var(--line) 0 10px, transparent 10px 24px) left / 2px calc(100% - 26px) no-repeat,
          repeating-linear-gradient(0deg, var(--line) 0 10px, transparent 10px 24px) right / 2px calc(100% - 26px) no-repeat;
        background-position:
          13px 0,
          13px 100%,
          0 13px,
          100% 13px;
      }

      .hero {
        padding: 40px 28px;
        overflow: hidden;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.2rem, 6vw, 4rem);
        font-weight: 500;
        letter-spacing: 0.08em;
        color: var(--text);
      }

      .hero p {
        margin: 16px 0 0;
        max-width: 34rem;
        line-height: 1.9;
        color: var(--muted);
      }

      .panel {
        margin-top: 28px;
        padding: 28px;
      }

      .section-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 16px;
      }

      .section-head h2 {
        margin: 0;
        font-size: 1.4rem;
        font-weight: 600;
      }

      .section-head span {
        color: var(--muted);
        font-size: 0.92rem;
      }

      .notice-frame {
        --line: rgba(255, 245, 238, 0.68);
        border-radius: 14px;
        background: transparent;
        padding: 10px 14px;
        max-height: 228px;
        overflow-y: auto;
        position: relative;
      }

      .notice-frame::-webkit-scrollbar {
        width: 10px;
      }

      .notice-frame::-webkit-scrollbar-thumb {
        background: rgba(215, 155, 114, 0.35);
        border-radius: 999px;
      }

      .notice-list {
        list-style: none;
        margin: 0;
        padding: 0;
      }

      .notice-item {
        display: grid;
        grid-template-columns: 132px 1fr;
        gap: 14px;
        align-items: start;
        padding: 14px 4px;
        border-bottom: 1px solid rgba(241, 225, 212, 0.16);
      }

      .notice-item:last-child {
        border-bottom: 0;
      }

      .notice-date {
        color: var(--accent);
        font-weight: 700;
        letter-spacing: 0.04em;
      }

      .notice-text {
        margin: 0;
        line-height: 1.8;
        color: var(--muted);
        overflow-wrap: anywhere;
      }

      .notice-empty {
        margin: 0;
        padding: 10px 4px;
        color: var(--muted);
      }

      @media (max-width: 640px) {
        main {
          width: min(100% - 20px, 920px);
          padding: 24px 0 40px;
        }

        .hero,
        .panel {
          border-radius: 16px;
        }

        .hero,
        .panel {
          padding: 22px 18px;
        }

        .notice-item {
          grid-template-columns: 1fr;
          gap: 6px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <h1>自分自身</h1>
      </section>

      <section class="panel" aria-labelledby="news-heading">
        <div class="section-head">
          <h2 id="news-heading">お知らせ</h2>
          <span>新しい順に表示されます</span>
        </div>

        <div class="notice-frame">
          <ul id="news-list" class="notice-list"></ul>
          <p id="news-empty" class="notice-empty" hidden>お知らせはまだありません。</p>
        </div>
      </section>
      <section class="panel">
        <div class="section-head">
          <h2>me</h2>
        </div>
        <p class="notice-text">
          自撮り投稿の一覧は <a href="/me">/me</a> から見られます。
        </p>
      </section>
    </main>

    <script src="./news-data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
