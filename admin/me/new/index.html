<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>New me Post</title>
    <link rel="stylesheet" href="/assets/selfies.css">
  </head>
  <body>
    <main class="shell">
      <header class="page-head">
        <div>
          <p class="eyebrow">Admin</p>
          <h1>新しい自撮り投稿</h1>
          <p class="lead">画像と一言コメントを入れるだけで公開されます。</p>
        </div>
        <nav class="page-links">
          <a href="/">Home</a>
          <a href="/me">Public</a>
          <a href="/admin/me">Admin List</a>
        </nav>
      </header>

      <section class="panel">
        <form id="selfie-form" class="selfie-form" novalidate>
          <input type="hidden" name="mode" value="new">

          <label class="field">
            <span>Image</span>
            <input type="file" name="image" accept="image/jpeg,image/png,image/webp" required>
            <small>jpg / jpeg / png / webp, 画像は送信前に軽量化されます。</small>
          </label>

          <div class="preview-wrap">
            <img id="image-preview" class="image-preview" alt="" hidden>
          </div>

          <label class="field">
            <span>Comment</span>
            <textarea name="comment" rows="4" maxlength="140" required></textarea>
            <small><span id="comment-count">0</span>/140</small>
          </label>

          <p id="form-message" class="message" hidden></p>

          <div class="form-actions">
            <button type="submit" class="primary">Post</button>
          </div>
        </form>
      </section>
    </main>

    <script>
      window.__SELFIE_FORM_MODE = "new";
      window.__SELFIE_POST_ID = "";
    </script>
    <script src="/assets/selfies-form.js"></script>
  </body>
</html>
